<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Meri Shehzadi 🥺❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #1a0f12 0%, #050203 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
            color: #fff;
        }
        .container {
            padding: 30px;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            background: rgba(255, 77, 109, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 77, 109, 0.1);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Screen 1: Glowing Heart */
        .heart-glow-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #heart-btn {
            font-size: 5.5rem;
            animation: heartbeat 1.4s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: drop-shadow(0 0 20px #ff4d6d);
            transition: transform 0.3s ease;
        }
        #heart-btn:active {
            transform: scale(0.9);
        }
        @keyframes heartbeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px #ff4d6d); }
            100% { transform: scale(1.18); filter: drop-shadow(0 0 35px #ff758f); }
        }
        .instructions {
            font-size: 0.95rem;
            color: #e0aaff;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: fadeInOut 2s infinite ease-in-out;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Screen 2: Message Screen */
        .hidden {
            display: none !important;
            opacity: 0;
        }
        h1.romantic {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: #ff758f;
            text-shadow: 0 0 15px rgba(255, 117, 143, 0.4);
            margin-bottom: 20px;
        }
        .message-box {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #f5f5f5;
            min-height: 180px;
            text-align: left;
            padding: 15px;
            border-left: 3px solid #ff4d6d;
            background: rgba(255, 77, 109, 0.04);
            border-radius: 0 16px 16px 0;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        /* Floating Hearts Animation */
        .floating-heart {
            position: absolute;
            color: #ff4d6d;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 5s linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.75;
            }
            85% {
                opacity: 0.75;
            }
            100% {
                transform: translateY(-10vh) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/One-Love-Emotional-Piano-Strings.mp3" type="audio/mpeg">
    </audio>

    <div id="screen-start" class="container">
        <div class="heart-glow-container" onclick="startSurprise()">
            <div id="heart-btn">❤️</div>
        </div>
        <p class="instructions">Tap the heart to start ✨</p>
    </div>

    <div id="screen-surprise" class="container hidden">
        <h1 class="romantic">Happy Birthday zoya meri jan always be happy Allah apki kamyab kry and next birthday ham ek saath manaye ameen❤❤! 🎉</h1>
        <div class="message-box" id="msg-content"></div>
    </div>

    <script>
        function startSurprise() {
            // Play Music
            const music = document.getElementById('bg-music');
            music.volume = 0.6; // Soft volume
            music.play().catch(error => {
                console.log("Audio play prevented by browser, but we handles it on click!");
            });

            // Change Screens
            const startScreen = document.getElementById('screen-start');
            const surpriseScreen = document.getElementById('screen-surprise');
            
            startScreen.classList.add('hidden');
            surpriseScreen.classList.remove('hidden');
            surpriseScreen.style.opacity = '1';

            // Luxury heart shower
            for (let i = 0; i < 30; i++) {
                setTimeout(createHeart, i * 120);
            }
            setInterval(createHeart, 350);

            // Start typing love letter
            startTypewriter();
        }

        // Custom merged message without specific name
        const heartLines = "Happy Birthday to the most special person in my life! Tumhare bina meri zindagi adhoori hai. Zindagi mein bahut log aate hain, par tum jaisa koi nahi. Tum meri zindagi ki wo khushi ho jise main khona nahi chahta. Birthday mubarak ho meri shehzadi, Allah tumhe dunya ki har khushi naseeb kare! 🤗❤️";
        
        let index = 0;
        function startTypewriter() {
            const msgBox = document.getElementById("msg-content");
            if (index < heartLines.length) {
                msgBox.innerHTML += heartLines.charAt(index);
                index++;
                setTimeout(startTypewriter, 55); // Classy typing speed
            }
        }

        // Floating Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '✨'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 22 + 14) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; // Slower & elegant
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }
    </script>
</body>
</html>
